name: Release

# 推送 v* 标签时全自动发布：
#   1. 验证 tag 与 __version__.py 一致
#   2. 构建 sdist + wheel
#   3. 构建 Rust agent runtime 二进制
#   4. 校验 wheel 可安装可用
#   5. 自动创建 GitHub Release
#   6. 上传 wheel + Rust 二进制到 Release 附件
#
# 使用方式：
#   git commit -am "release: v0.2.0"
#   git tag v0.2.0
#   git push origin main --tags

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches __version__.py
        shell: bash
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_RAW#v}"

          CODE_VERSION="$(python -c "from __version__ import __version__; print(__version__)")"

          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "❌ 标签 ($TAG_VERSION) 与 __version__.py ($CODE_VERSION) 不匹配"
            exit 1
          fi
          echo "✅ 版本一致: $TAG_VERSION"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build sdist & wheel
        run: |
          python -m build --outdir dist/

      - name: Verify wheel
        run: |
          ls -lh dist/
          python -m pip install dist/*.whl
          luna version

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Rust agent runtime
        run: cargo build --release --package luna-agent-runtime

      - name: Package Rust binary
        shell: bash
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME}"
          BIN="target/release/luna-agent-runtime"
          if [ -f "$BIN" ]; then
            ARCHIVE="luna-agent-runtime-x86_64-unknown-linux-gnu-${TAG_RAW}.tar.gz"
            tar -czf "$ARCHIVE" -C target/release luna-agent-runtime
            mv "$ARCHIVE" dist/
            echo "✅ Rust binary packaged: $ARCHIVE"
          else
            echo "⚠️  Rust binary not found, skipping"
          fi

      - name: Create Release & upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # 收集所有附件（wheel + Rust 二进制）
          ASSETS=()
          for f in dist/*.tar.gz dist/*.whl; do
            if [ -f "$f" ]; then
              ASSETS+=("$f")
            fi
          done
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "${ASSETS[@]}"
