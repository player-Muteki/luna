name: Release

# 在 GitHub 上发布 Release 时自动触发。
# 构建 wheel 并作为 Release 附件上传。
#
# 使用方式：
#   1. 改 __version__.py 版本号
#   2. git commit -am "release: v0.2.0"
#   3. git tag v0.2.0
#   4. git push origin main --tags
#   5. GitHub → Releases → 点刚才的 tag → 写说明 → Publish
#   6. CI 自动构建并上传 wheel 到 Release 附件

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches __version__.py
        shell: bash
        run: |
          set -euo pipefail
          TAG_RAW="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_RAW#v}"  # strip leading v

          CODE_VERSION="$(python -c "from __version__ import __version__; print(__version__)")"

          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "❌ 标签 ($TAG_VERSION) 与 __version__.py ($CODE_VERSION) 不匹配"
            exit 1
          fi
          echo "✅ 版本一致: $TAG_VERSION"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist/

      - name: Verify wheel
        run: |
          ls -lh dist/
          python -m pip install dist/*.whl
          co-thinker version

      - name: Upload wheel to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
